  <rect x="243" y="446" width="214" height="54" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="350" y="467" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">Compliance Document</text>
  <text x="350" y="484" text-anchor="middle" font-size="10" fill="#64748b">90% auto-populated · Word (.docx)</text>

  <rect x="438" y="446" width="214" height="54" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="545" y="467" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">Evidence Package</text>
  <text x="545" y="484" text-anchor="middle" font-size="10" fill="#64748b">audit-ready bundle · S3</text>

  <text x="350" y="520" text-anchor="middle" font-size="9.5" fill="#94a3b8">Observability: CloudWatch · X-Ray · CloudTrail · KMS encryption · DLQ · Budget alerts</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 234" font-family="Inter Variable, Inter, system-ui, -apple-system, sans-serif">
<style>
  :root {
    --bg: #ffffff; --card: #f9fafb; --border: #e5e7eb;

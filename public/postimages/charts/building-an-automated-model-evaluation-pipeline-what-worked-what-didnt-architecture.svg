  <text x="195" y="84" text-anchor="middle" font-size="10" fill="#64748b">Claude · Amazon Bedrock</text>

  <rect x="420" y="48" width="170" height="46" rx="6" fill="#eff6ff" stroke="#0284c7" stroke-width="1.5"/>
  <text x="505" y="68" text-anchor="middle" font-size="12" font-weight="600" fill="#0c4a6e">Evaluation Dataset</text>

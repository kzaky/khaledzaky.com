  <text x="116" y="196" text-anchor="middle" font-size="9.5" fill="#94a3b8">accuracy · relevance</text>

  <rect x="195" y="165" width="133" height="40" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="261" y="181" text-anchor="middle" font-size="11" fill="#1e293b">Groundedness</text>
  <text x="261" y="196" text-anchor="middle" font-size="9.5" fill="#94a3b8">hallucination checks</text>


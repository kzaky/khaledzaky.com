  <polyline points="505,94 505,118 350,118" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="350" y1="118" x2="350" y2="138" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>


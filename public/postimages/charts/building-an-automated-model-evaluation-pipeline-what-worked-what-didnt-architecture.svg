  <text x="350" y="379" text-anchor="middle" font-size="12" font-weight="600" fill="#0c4a6e">Scoring &amp; Normalization</text>
  <text x="350" y="396" text-anchor="middle" font-size="10" fill="#64748b">governance thresholds · pass/fail per dimension · scorecard</text>


  <rect x="38" y="138" width="624" height="196" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="350" y="157" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">AWS Step Functions — 8 Parallel Evaluation Dimensions</text>


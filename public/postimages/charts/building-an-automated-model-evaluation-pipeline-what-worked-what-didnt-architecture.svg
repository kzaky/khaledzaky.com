  <line x1="350" y1="406" x2="350" y2="424" stroke="#94a3b8" stroke-width="1.5"/>
  <polyline points="155,424 545,424" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="155" y1="424" x2="155" y2="446" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="350" y1="424" x2="350" y2="446" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="545" y1="424" x2="545" y2="446" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>


  <text x="116" y="248" text-anchor="middle" font-size="9.5" fill="#94a3b8">demographic variance</text>

  <rect x="195" y="217" width="133" height="40" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="261" y="233" text-anchor="middle" font-size="11" fill="#1e293b">Robustness</text>
  <text x="261" y="248" text-anchor="middle" font-size="9.5" fill="#94a3b8">adversarial inputs</text>

  <rect x="340" y="217" width="133" height="40" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="406" y="233" text-anchor="middle" font-size="11" fill="#1e293b">Structured Output</text>
  <text x="406" y="248" text-anchor="middle" font-size="9.5" fill="#94a3b8">schema compliance</text>

  <rect x="485" y="217" width="133" height="40" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="551" y="233" text-anchor="middle" font-size="11" fill="#1e293b">Explainability</text>
